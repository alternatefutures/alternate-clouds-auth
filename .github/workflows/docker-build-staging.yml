name: Build and Publish Docker Image (Staging)

on:
  push:
    branches:
      - develop
    paths:
      - 'src/**'
      - 'prisma/**'
      - 'Dockerfile'
      - 'package.json'
      - '.github/workflows/docker-build-staging.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  NAMESPACE: af-staging

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write   # keyless cosign signing via Sigstore OIDC
      security-events: write   # upload Trivy SARIF to code scanning

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          no-cache: true
          platforms: linux/amd64
          provenance: false
          # IMPORTANT: :staging is the rolling pointer staging pulls
          # via imagePullPolicy:Always, so it must NOT be moved until
          # the supply-chain gate, rollout, and health check all pass
          # (see "Promote :staging tag" step below). Per-commit
          # staging-{sha} tag is fine to publish unconditionally for
          # traceability / rollback.
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging-${{ github.sha }}

      - name: Resolve immutable image reference
        id: image
        run: |
          DIGEST="${{ steps.build.outputs.digest }}"
          if [ -z "${DIGEST}" ]; then
            echo "::error::docker/build-push-action did not emit a digest"
            exit 1
          fi
          IMAGE_REF="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${DIGEST}"
          echo "ref=${IMAGE_REF}" >> $GITHUB_OUTPUT
          echo "digest=${DIGEST}" >> $GITHUB_OUTPUT
          echo "Pinned image: ${IMAGE_REF}"

      # ---------------------------------------------------------------
      # Supply-chain: cosign keyless signing, SBOM (syft), trivy scan.
      # Staging is the canary for supply-chain hardening — we run it
      # here first to catch toolchain breakage before main. Set
      # SUPPLY_CHAIN_DISABLED=true to skip during an incident; flip
      # SUPPLY_CHAIN_TRIVY_BLOCK=false to demote Trivy CRITICAL to a
      # warning.
      # ---------------------------------------------------------------
      - name: Install cosign
        if: ${{ env.SUPPLY_CHAIN_DISABLED != 'true' }}
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.4.1

      - name: Install syft
        if: ${{ env.SUPPLY_CHAIN_DISABLED != 'true' }}
        uses: anchore/sbom-action/download-syft@v0

      - name: Install trivy
        if: ${{ env.SUPPLY_CHAIN_DISABLED != 'true' }}
        env:
          TRIVY_VERSION: "0.70.0"
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/trivy.tar.gz \
            "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          tar -xzf /tmp/trivy.tar.gz -C /tmp trivy
          sudo install -m 0755 /tmp/trivy /usr/local/bin/trivy
          trivy --version

      - name: Sign image with cosign (keyless / Sigstore OIDC)
        if: ${{ env.SUPPLY_CHAIN_DISABLED != 'true' }}
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: cosign sign --yes "${{ steps.image.outputs.ref }}"

      - name: Generate SBOM (CycloneDX + SPDX)
        if: ${{ env.SUPPLY_CHAIN_DISABLED != 'true' }}
        run: |
          syft "${{ steps.image.outputs.ref }}" \
            -o cyclonedx-json=sbom.cyclonedx.json \
            -o spdx-json=sbom.spdx.json

      - name: Attach SBOM as cosign attestation
        if: ${{ env.SUPPLY_CHAIN_DISABLED != 'true' }}
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign attest --yes \
            --predicate sbom.cyclonedx.json \
            --type cyclonedx \
            "${{ steps.image.outputs.ref }}"

      - name: Upload SBOM artifacts
        if: ${{ env.SUPPLY_CHAIN_DISABLED != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: sbom-staging-${{ github.sha }}
          path: |
            sbom.cyclonedx.json
            sbom.spdx.json
          retention-days: 90

      - name: Trivy vulnerability scan (blocks on CRITICAL)
        if: ${{ env.SUPPLY_CHAIN_DISABLED != 'true' }}
        env:
          TRIVY_EXIT_CODE: ${{ env.SUPPLY_CHAIN_TRIVY_BLOCK == 'false' && '0' || '1' }}
        run: |
          trivy image \
            --severity CRITICAL \
            --ignore-unfixed \
            --exit-code "${TRIVY_EXIT_CODE}" \
            --no-progress \
            --format table \
            "${{ steps.image.outputs.ref }}"

          trivy image \
            --severity HIGH \
            --ignore-unfixed \
            --no-progress \
            --format table \
            "${{ steps.image.outputs.ref }}" || true

          trivy image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format sarif \
            --output trivy.sarif \
            "${{ steps.image.outputs.ref }}" || true

      - name: Upload Trivy SARIF to code scanning
        if: ${{ env.SUPPLY_CHAIN_DISABLED != 'true' && always() }}
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif
          category: trivy-${{ github.workflow }}

      - name: Set up kubectl (staging)
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_B64_STAGING }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy to K3s staging
        run: |
          IMAGE="${{ steps.image.outputs.ref }}"
          echo "Deploying image: ${IMAGE}"
          kubectl set image deployment/service-auth \
            service-auth=${IMAGE} \
            -n ${{ env.NAMESPACE }} --insecure-skip-tls-verify
          kubectl rollout status deployment/service-auth \
            -n ${{ env.NAMESPACE }} --timeout=120s --insecure-skip-tls-verify

      - name: Run Prisma migrations (staging)
        run: |
          kubectl exec deployment/service-auth -n ${{ env.NAMESPACE }} --insecure-skip-tls-verify -- npx prisma migrate deploy

      - name: Verify deployment (staging)
        id: verify
        run: |
          kubectl get pods -n ${{ env.NAMESPACE }} -l app=service-auth --insecure-skip-tls-verify
          echo "---"
          sleep 10
          if curl -sf --max-time 15 https://auth.staging.alternatefutures.ai/health; then
            echo "Auth healthy"
            echo "healthy=true" >> $GITHUB_OUTPUT
          else
            echo "::error::Post-deploy health check failed for service-auth staging"
            echo "healthy=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      # Promote :staging only after the full pipeline passes. Same
      # reasoning as production :latest — the rolling tag should never
      # point at an image that didn't successfully roll out.
      - name: Promote :staging tag (post-verify)
        if: success()
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            --tag "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging" \
            "${{ steps.image.outputs.ref }}"
