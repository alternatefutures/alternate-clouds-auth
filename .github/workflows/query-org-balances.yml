name: Query Org Balances

on:
  workflow_dispatch:

jobs:
  query:
    runs-on: ubuntu-latest
    steps:
      - name: Set up kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Query org balances and inference ledger
        run: |
          kubectl exec deployment/service-auth -n af-production --insecure-skip-tls-verify -- \
            node -e "
            const { PrismaClient } = require('@prisma/client');
            const prisma = new PrismaClient();
            async function main() {
              const funded = await prisma.organizationUsageBalance.count({ where: { balanceCents: { gt: 0 } } });
              const total = await prisma.organizationUsageBalance.count();
              const topBalances = await prisma.organizationUsageBalance.findMany({ orderBy: { balanceCents: 'desc' }, take: 5, select: { balanceCents: true, orgBillingId: true } });
              // Check ledger for inference debits (the actual debit records, not the usage log)
              const inferenceDebits = await prisma.organizationUsageLedger.groupBy({ by: ['reason'], _count: true, _sum: { amountCents: true } });
              // Any topups that happened
              const topups = await prisma.organizationUsageLedger.count({ where: { reason: 'topup' } });
              console.log(JSON.stringify({ funded, total, topBalances, inferenceDebits, topups }));
              await prisma.\$disconnect();
            }
            main().catch(e => { console.error(e); process.exit(1); });
            "
