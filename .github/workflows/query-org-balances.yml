name: Query Org Balances

on:
  workflow_dispatch:

jobs:
  query:
    runs-on: ubuntu-latest
    steps:
      - name: Set up kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Query org balances and inference gate
        run: |
          kubectl exec deployment/service-auth -n af-production --insecure-skip-tls-verify -- \
            node -e "
            const { PrismaClient } = require('@prisma/client');
            const prisma = new PrismaClient();
            async function main() {
              // How many orgs have a funded balance (>0 cents)
              const funded = await prisma.organizationUsageBalance.count({ where: { balance_cents: { gt: 0 } } });
              const total = await prisma.organizationUsageBalance.count();
              const topBalances = await prisma.organizationUsageBalance.findMany({ orderBy: { balance_cents: 'desc' }, take: 5, select: { balance_cents: true, org_billing_id: true } });
              // How many 402 rejections visible via audit log
              const inferenceAudit = await prisma.auditEvent.count({ where: { action: { contains: 'inference' } } }).catch(() => -1);
              console.log(JSON.stringify({ funded, total, topBalances, inferenceAudit }));
              await prisma.\$disconnect();
            }
            main().catch(e => { console.error(e); process.exit(1); });
            "
