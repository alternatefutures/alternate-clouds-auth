name: Dependency Review

on:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          # Fail the build if there are any vulnerable dependencies
          fail-on-severity: moderate
          # Comment on the PR with the results
          comment-summary-in-pr: true
          # Only allow permissive licenses (implicitly denies GPL, AGPL, etc.)
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, 0BSD, CC0-1.0, Unlicense, WTFPL, CC-BY-3.0, CC-BY-4.0, Python-2.0, BlueOak-1.0.0
