name: Build and Publish Docker Image

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'prisma/**'
      - 'Dockerfile'
      - 'package.json'
      - '.github/workflows/docker-build.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          no-cache: true
          platforms: linux/amd64
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Resolve immutable image reference
        if: github.ref == 'refs/heads/main'
        id: image
        run: |
          DIGEST="${{ steps.build.outputs.digest }}"
          if [ -z "${DIGEST}" ]; then
            echo "::error::docker/build-push-action did not emit a digest"
            exit 1
          fi
          IMAGE_REF="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${DIGEST}"
          echo "ref=${IMAGE_REF}" >> $GITHUB_OUTPUT
          echo "digest=${DIGEST}" >> $GITHUB_OUTPUT
          echo "Pinned image: ${IMAGE_REF}"

      - name: Set up kubectl
        if: github.ref == 'refs/heads/main'
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy to K3s
        if: github.ref == 'refs/heads/main'
        run: |
          IMAGE="${{ steps.image.outputs.ref }}"
          echo "Deploying image: ${IMAGE}"
          kubectl set image deployment/service-auth \
            service-auth=${IMAGE} \
            -n af-production --insecure-skip-tls-verify
          kubectl rollout status deployment/service-auth \
            -n af-production --timeout=120s --insecure-skip-tls-verify

      - name: Run Prisma migrations
        if: github.ref == 'refs/heads/main'
        run: |
          kubectl exec deployment/service-auth -n af-production --insecure-skip-tls-verify -- npx prisma migrate deploy

      - name: Verify deployment
        if: github.ref == 'refs/heads/main'
        id: verify
        run: |
          kubectl get pods -n af-production -l app=service-auth --insecure-skip-tls-verify
          echo "---"
          sleep 10
          if curl -sf --max-time 15 https://auth.alternatefutures.ai/health; then
            echo "Auth healthy"
            echo "healthy=true" >> $GITHUB_OUTPUT
          else
            echo "::error::Post-deploy health check failed for service-auth"
            echo "healthy=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Discord notification (success)
        if: success() && github.ref == 'refs/heads/main'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          [ -z "$DISCORD_WEBHOOK_URL" ] && exit 0
          curl -sf -H "Content-Type: application/json" -d "{
            \"embeds\": [{
              \"title\": \"✅ service-auth deployed\",
              \"description\": \"Commit: \`${GITHUB_SHA::7}\`\nDigest: \`${{ steps.image.outputs.digest }}\`\nHealth: ${{ steps.verify.outputs.healthy == 'true' && 'passing' || 'pending' }}\n[View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\",
              \"color\": 3066993,
              \"footer\": {\"text\": \"Alternate Clouds Deploy\"},
              \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
            }]
          }" "$DISCORD_WEBHOOK_URL"

      - name: Discord notification (failure)
        if: failure() && github.ref == 'refs/heads/main'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          [ -z "$DISCORD_WEBHOOK_URL" ] && exit 0
          curl -sf -H "Content-Type: application/json" -d "{
            \"embeds\": [{
              \"title\": \"❌ service-auth deploy FAILED\",
              \"description\": \"Commit: \`${GITHUB_SHA::7}\`\n[View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\",
              \"color\": 15548997,
              \"footer\": {\"text\": \"Alternate Clouds Deploy\"},
              \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
            }]
          }" "$DISCORD_WEBHOOK_URL"

      - name: Summary
        run: |
          echo "## Docker Image Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image**: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags**:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
